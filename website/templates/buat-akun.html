{%extends "base.html"%}

{%block title%}Buat Akun Siswa{%endblock%}

{%block content%}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-md-10 col-lg-8">

      <h4 class="fw-bold mb-4">
        <i class="fa-solid fa-user-plus me-2"></i>Buat Akun Anda
      </h4>

      <form method="POST" enctype="multipart/form-data">

        <!-- SECTION: Data Pribadi -->
        <div class="card shadow-sm mb-4">
          <div class="card-header bg-dark text-white fw-bold">
            <i class="fa-solid fa-id-card me-2"></i>Masukkan data anda
          </div>
          <div class="card-body">

            <!-- NISN & NIS -->
            <div class="row g-3 mt-1">
              <div class="col-md-6">
                <label for="nis" class="form-label fw-semibold">NIS</label>
                <input type="text" class="form-control" id="nis" name="nis" placeholder="Nomor Induk Sekolah">
              </div>

              <div class="col-md-6">
                <label for="password" class="form-label fw-semibold">PASSWORD</label>
                <div class="input-group">
                    <input type="password" class="form-control" id="password" name="password" placeholder="*****">
                    <button class="btn btn-outline-secondary" type="button" id="togglePassword" onclick="togglePass()">
                    <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" width="18" height="18">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2"/>
                        <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
                    </svg>
                    </button>
                </div>
                </div>

                <script>
                function togglePass() {
                    const input = document.getElementById('password');
                    const icon = document.getElementById('eyeIcon');
                    const isPassword = input.type === 'password';

                    input.type = isPassword ? 'text' : 'password';

                    // Ganti icon mata terbuka / tertutup
                    icon.innerHTML = isPassword
                    ? `<!-- eye-off -->
                        <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20C5 20 1 12 1 12a18.5 18.5 0 0 1 5.06-6.94" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>`
                    : `<!-- eye -->
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2"/>
                        <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>`;
                }
                </script>
            </div>

          </div>
        </div>

        <!-- Tombol Submit -->
        <div class="d-flex justify-content-end gap-2 mb-5">
          <a href="/" class="btn btn-outline-secondary">
            <i class="fa-solid fa-xmark me-1"></i>Batal
          </a>
          <button type="submit" class="btn btn-primary px-4">
            <i class="fa-solid fa-floppy-disk me-1"></i>Buat
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
{%endblock%}
