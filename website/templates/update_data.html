{%extends "base.html"%}

{%block title%}Input Data{%endblock%}

{%block content%}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-md-10 col-lg-8">

      <h4 class="fw-bold mb-4">
        <i class="fa-solid fa-user-plus me-2"></i>Update Data Siswa
      </h4>

      <form method="POST" enctype="multipart/form-data">

        <!-- SECTION: Data Pribadi -->
        <div class="card shadow-sm mb-4">
          <div class="card-header bg-dark text-white fw-bold">
            <i class="fa-solid fa-id-card me-2"></i>Data Pribadi
          </div>
          <div class="card-body">

            <!-- Foto -->
            <div class="mb-3">
              <label for="gambar" class="form-label fw-semibold">Foto Siswa</label>
              <input type="file" class="form-control" id="gambar" name="gambar" accept="image/*">
            </div>

            <!-- Nama & Kelas -->
            <div class="row g-3">
              <div class="col-md-8">
                <label for="name" class="form-label fw-semibold">Nama Lengkap</label>
                <input type="text" class="form-control" id="name" name="name" placeholder="Masukkan nama lengkap">
              </div>
            </div>

            <!-- NISN & NIS -->
            <div class="row g-3 mt-1">
              <div class="col-md-6">
                <label for="nisn" class="form-label fw-semibold">NISN</label>
                <input type="text" class="form-control" id="nisn" name="nisn" placeholder="10 digit NISN">
              </div>
              <div class="col-md-6">
                <label for="nis" class="form-label fw-semibold">NIS</label>
                <input type="text" class="form-control" id="nis" name="nis" placeholder="Nomor Induk Sekolah">
              </div>
            </div>

            <!-- Tanggal & Tempat Lahir -->
            <div class="row g-3 mt-1">
              <div class="col-md-6">
                <label for="tanggal_lahir" class="form-label fw-semibold">Tanggal Lahir</label>
                <input type="date" class="form-control" id="tanggal_lahir" name="tanggal_lahir">
              </div>
              <div class="col-md-6">
                <label for="tempat_lahir" class="form-label fw-semibold">Tempat Lahir</label>
                <input type="text" class="form-control" id="tempat_lahir" name="tempat_lahir" placeholder="Kota kelahiran">
              </div>
            </div>

            <!-- Agama & Sekolah Asal -->
            <div class="row g-3 mt-1">
              <div class="col-md-6">
                <label for="agama" class="form-label fw-semibold">Agama</label>
                <select class="form-select" id="agama" name="agama">
                  <option value="" disabled selected>Pilih agama</option>
                  <option>Islam</option>
                  <option>Kristen</option>
                  <option>Katolik</option>
                  <option>Hindu</option>
                  <option>Buddha</option>
                  <option>Konghucu</option>
                </select>
              </div>
              <div class="col-md-6">
                <label for="sekolah_asal" class="form-label fw-semibold">Sekolah Asal</label>
                <input type="text" class="form-control" id="sekolah_asal" name="sekolah_asal" placeholder="Nama SD asal">
              </div>
            </div>

            <div class="row g-3">
              <div class="col-md-6">
                <label for="lulus" class="form-label fw-semibold">Lulus</label>
                <input type="text" class="form-control" id="lulus" name="lulus" placeholder="Ya/Tidak">
              </div>
              <div class="col-md-6">
                <label for="alamat" class="form-label fw-semibold">alamat</label>
                <input type="text" class="form-control" id="alamat" name="alamat" >
              </div>
            </div>

            <div class="row g-3">
              <div class="col-md-6">
                <label for="rt" class="form-label fw-semibold">rt</label>
                <input type="text" class="form-control" id="rt" name="rt" >
              </div>
              <div class="col-md-6">
                <label for="rw" class="form-label fw-semibold">rw</label>
                <input type="text" class="form-control" id="rw" name="rw" >
              </div>
            </div>

            <div class="row g-3">
              <div class="col-md-6">
                <label for="kelurahan" class="form-label fw-semibold">kelurahan</label>
                <input type="text" class="form-control" id="kelurahan" name="kelurahan" >
              </div>
              <div class="col-md-6">
                <label for="kecamatan" class="form-label fw-semibold">kecamatan</label>
                <input type="text" class="form-control" id="kecamatan" name="kecamatan" >
              </div>
            </div>

          </div>
        </div>

         <!-- SECTION: Nilai -->
         <div class="card shadow-sm mb-4 card-nilai">
           <div class="card-header-nilai">
             <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
               <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
               <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
               <line x1="10" y1="8" x2="16" y2="8"/>
               <line x1="10" y1="12" x2="16" y2="12"/>
             </svg>
             Nilai Akademik
           </div>
           <div class="card-body p-4">
             <!-- Upload Area -->
             <div class="upload-zone mb-4" onclick="document.getElementById('upload_nilai').click()">
               <div class="upload-icon">
                 <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2">
                   <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                   <polyline points="17 8 12 3 7 8"/>
                   <line x1="12" y1="3" x2="12" y2="15"/>
                 </svg>
               </div>
               <div>
                 <p class="upload-label mb-0"><strong>Upload Nilai Sekaligus</strong></p>
                 <p class="upload-label mb-0 text-muted" id="upload-filename">Klik untuk memilih file</p>
               </div>
               <input type="file" class="d-none" id="upload_nilai" name="upload_nilai"
                     onchange="document.getElementById('upload-filename').textContent = this.files[0]?.name || 'Klik untuk memilih file'">
             </div>
             <!-- Grid Nilai -->
             <div class="row g-3">
               <div class="col-md-6">
                 <label for="n_agama" class="nilai-label">Agama</label>
                 <input type="number" class="nilai-input form-control" id="n_agama" name="n_agama"
                       placeholder="0 – 100" min="0" max="100">
               </div>
               <div class="col-md-6">
                 <label for="n_pancasila" class="nilai-label">PPKN / Pancasila</label>
                 <input type="number" class="nilai-input form-control" id="n_pancasila" name="n_pancasila"
                       placeholder="0 – 100" min="0" max="100">
               </div>
               <div class="col-md-6">
                 <label for="n_indonesia" class="nilai-label">Bahasa Indonesia</label>
                 <input type="number" class="nilai-input form-control" id="n_indonesia" name="n_indonesia"
                       placeholder="0 – 100" min="0" max="100">
               </div>
               <div class="col-md-6">
                 <label for="n_matematika" class="nilai-label">Matematika</label>
                 <input type="number" class="nilai-input form-control" id="n_matematika" name="n_matematika"
                       placeholder="0 – 100" min="0" max="100">
               </div>
               <div class="col-md-6">
                 <label for="n_ipa" class="nilai-label">IPA</label>
                 <input type="number" class="nilai-input form-control" id="n_ipa" name="n_ipa"
                       placeholder="0 – 100" min="0" max="100">
               </div>
               <div class="col-md-6">
                 <label for="n_ips" class="nilai-label">IPS</label>
                 <input type="number" class="nilai-input form-control" id="n_ips" name="n_ips"
                       placeholder="0 – 100" min="0" max="100">
               </div>
               <div class="col-md-6">
                 <label for="n_inggris" class="nilai-label">Bahasa Inggris</label>
                 <input type="number" class="nilai-input form-control" id="n_inggris" name="n_inggris"
                       placeholder="0 – 100" min="0" max="100">
               </div>
               <div class="col-md-6">
                 <label for="n_seni_budaya" class="nilai-label">Seni Budaya</label>
                 <input type="number" class="nilai-input form-control" id="n_seni_budaya" name="n_seni_budaya"
                       placeholder="0 – 100" min="0" max="100">
               </div>
               <div class="col-md-6">
                 <label for="n_olahraga" class="nilai-label">Olahraga</label>
                 <input type="number" class="nilai-input form-control" id="n_olahraga" name="n_olahraga"
                       placeholder="0 – 100" min="0" max="100">
               </div>
               <div class="col-md-6">
                 <label for="n_prakarya" class="nilai-label">Prakarya</label>
                 <input type="number" class="nilai-input form-control" id="n_prakarya" name="n_prakarya"
                       placeholder="0 – 100" min="0" max="100">
               </div>
             </div>
           </div>
         </div>
        {# <!-- SECTION: Nilai -->

              </div>
              <div class="col-md-6">
                <label for="n_olahraga" class="form-label fw-semibold">Olahraga</label>
                <input type="number" class="form-control" id="n_olahraga" name="n_olahraga" placeholder="0 - 100" min="0" max="100">
              </div>
              <div class="col-md-6">
                <label for="n_prakarya" class="form-label fw-semibold">Prakarya</label>
                <input type="number" class="form-control" id="n_prakarya" name="n_prakarya" placeholder="0 - 100" min="0" max="100">
              </div>
            </div>
          </div>
        </div> #}

        <!-- Tombol Submit -->
        <div class="d-flex justify-content-end gap-2 mb-5">
          <a href="/" class="btn btn-outline-secondary">
            <i class="fa-solid fa-xmark me-1"></i>Batal
          </a>
          <button type="submit" class="btn btn-primary px-4">
            <i class="fa-solid fa-floppy-disk me-1"></i>Simpan Data
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
{%endblock%}
